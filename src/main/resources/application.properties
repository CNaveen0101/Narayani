# ============================================
#  Narayani Market – application.properties
# ============================================

# Server port (change to 80 on EC2 with sudo, or keep 8080 behind Nginx)
server.port=8080

# Application name
spring.application.name=narayani-market

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Logging
logging.level.com.narayanimarket=INFO
